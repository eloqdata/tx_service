name: Log Service Tests

# Builds the in-tree eloq_log_service (compile-check for all test targets) and
# runs its RocksDB-Cloud unit tests against a MinIO (S3-compatible) endpoint, so
# no real AWS credentials or buckets are needed.
on:
  pull_request:
    paths:
      - 'eloq_log_service/**'
      - 'tx_service/tx-log-protos/**'
      - 'third_party/ini/**'
      - '.github/workflows/log-service-tests.yml'
  push:
    branches: [main]

jobs:
  log-service-tests:
    runs-on: ubuntu-latest
    container:
      image: eloqdata/eloq-dev-ci-ubuntu2404:latest
      # Run as root so actions/checkout can write under /__w/_temp (mirrors
      # unit-tests.yml); otherwise checkout fails with EACCES in this image.
      options: --user root
    env:
      # Consumed by eloq_log_service/test/test_utils.h + the cloud test harness:
      # routes rocksdb-cloud's S3 client at MinIO with path-style addressing.
      # MinIO runs as a local binary in this job (see "Start MinIO"): GitHub
      # `services:` can't run the official minio image (it needs a `server`
      # command) and bitnami's `:latest` tag was retired.
      TEST_S3_ENDPOINT: http://127.0.0.1:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_EC2_METADATA_DISABLED: "true"

    steps:
      - name: Checkout (recursive submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compile-check (RocksDB, all test targets)
        run: |
          cmake -S eloq_log_service -B eloq_log_service/bld \
            -DCMAKE_BUILD_TYPE=Debug -DWITH_LOG_STATE=ROCKSDB
          cmake --build eloq_log_service/bld --parallel "$(nproc)"

      - name: Build cloud variant (RocksDB-Cloud S3 + Catch2 tests)
        run: |
          cmake -S eloq_log_service -B eloq_log_service/bld_cloud \
            -DCMAKE_BUILD_TYPE=Debug -DWITH_LOG_STATE=ROCKSDB_CLOUD_S3
          cmake --build eloq_log_service/bld_cloud --parallel "$(nproc)"

      - name: Run cloud unit tests against MinIO
        # Start MinIO and run the test in one step so the server (backgrounded)
        # is guaranteed alive for the test. Uses curl health checks (POSIX-sh
        # compatible) rather than bash-only /dev/tcp, since the default step
        # shell here is sh.
        run: |
          curl -fsSL https://dl.min.io/server/minio/release/linux-amd64/minio \
            -o /usr/local/bin/minio
          chmod +x /usr/local/bin/minio
          mkdir -p /tmp/minio-data
          MINIO_ROOT_USER=minioadmin MINIO_ROOT_PASSWORD=minioadmin \
            minio server /tmp/minio-data --address ":9000" > /tmp/minio.log 2>&1 &
          ok=0
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1; then
              ok=1; echo "MinIO is up"; break
            fi
            sleep 1
          done
          if [ "$ok" != "1" ]; then
            echo "MinIO failed to start:" >&2; cat /tmp/minio.log >&2; exit 1
          fi
          # test_rocksdb_cloud_sst_reader exercises the rocksdb-cloud storage
          # provider end-to-end against MinIO. The DBCloud::Open-based cases
          # currently crash inside librocksdb-cloud (ABI/vtable mismatch) and are
          # tracked separately, so they are excluded here.
          cd eloq_log_service/bld_cloud
          ./log_server_rocksdb_cloud_tests "test_rocksdb_cloud_sst_reader" \
            --region us-east-1 \
            --aws_access_key_id minioadmin \
            --aws_secret_key minioadmin
